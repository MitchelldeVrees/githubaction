name: Dominant MA/EMA Scanner

on:
  schedule:
    # GitHub cron uses UTC. 20:30 UTC is 22:30 Amsterdam during daylight saving time.
    - cron: "30 20 * * 1-5"
  workflow_dispatch:
    inputs:
      commit_results:
        description: "Commit updated results/latest_results.csv and .json back to the repository"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_NO_SIGNAL_MESSAGE: ${{ vars.SEND_NO_SIGNAL_MESSAGE }}
          BULL_BARS_REQUIRED: ${{ vars.BULL_BARS_REQUIRED }}
          BEAR_BARS_REQUIRED: ${{ vars.BEAR_BARS_REQUIRED }}
          TOUCH_DISTANCE_PCT: ${{ vars.TOUCH_DISTANCE_PCT }}
          BOUNCE_LOOKBACK: ${{ vars.BOUNCE_LOOKBACK }}
          BOUNCE_WEIGHT: ${{ vars.BOUNCE_WEIGHT }}
          YFINANCE_PERIOD: ${{ vars.YFINANCE_PERIOD }}
          YFINANCE_AUTO_ADJUST: ${{ vars.YFINANCE_AUTO_ADJUST }}
        run: python scanner.py

      - name: Upload scanner results
        uses: actions/upload-artifact@v4
        with:
          name: dominant-ma-alert-results
          path: |
            results/latest_results.csv
            results/latest_results.json
          if-no-files-found: error

      - name: Commit updated results
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.commit_results == true) || (github.event_name == 'schedule' && vars.COMMIT_RESULTS == 'true') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/latest_results.csv results/latest_results.json
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "Update scanner results"
            git push
          fi
